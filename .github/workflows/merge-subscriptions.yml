name: 自动合并订阅文件

on:
  schedule:
    - cron: '0 0 * * *'      # 北京时间每天早上 8 点
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成最新订阅文件
        run: |
          mkdir -p outputs
          python merge_sources.py

      - name: 配置 Git 并提交
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 检查是否有实际变化
          git add outputs/merged_subscriptions.txt

          if git diff --staged --quiet; then
            echo "📭 订阅内容无变化，跳过提交"
          else
            echo "📤 检测到更新，正在提交..."

            # 先提交本地变更
            git commit -m "🔄 自动更新合并订阅文件 $(date '+%Y-%m-%d %H:%M:%S')"

            # 再拉取远程最新代码并 rebase
            git pull --rebase origin main || echo "⚠️ Pull 出现警告，继续尝试推送"

            # 最终推送（使用 force-with-lease 安全处理）
            git push --force-with-lease origin main
          fi
