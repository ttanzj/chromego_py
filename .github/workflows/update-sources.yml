name: 更新订阅地址 sources.txt

on:
  # 仅支持手动触发，不会自动运行
  workflow_dispatch:
    inputs:
      run_description:
        description: '运行说明（可选）'
        required: false
        default: '手动更新 sources.txt'
        type: string

jobs:
  update-sources:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 已移除 cache: 'pip'，避免无依赖时产生警告

      - name: 运行 update_sources.py 生成最新 sources.txt
        run: |
          python update_sources.py

      - name: 检查 sources.txt 是否有实际变更
        id: git-check
        run: |
          if git diff --quiet HEAD -- urls/sources.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ sources.txt 内容没有变化，无需提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 sources.txt 已更新，即将提交"
          fi

      - name: 配置 Git 用户信息
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 拉取最新远程代码并 rebase（自动处理冲突）
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git pull --rebase --autostash origin main
          echo "✅ 已成功 rebase 远程最新代码"

      - name: 提交并推送更新
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git add urls/sources.txt
          git commit -m "chore: 更新 sources.txt (手动触发)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 执行结果
        run: |
          echo "🎉 Workflow 执行完成！"
          if [ "${{ steps.git-check.outputs.changed }}" = "true" ]; then
            echo "   ✅ sources.txt 已更新并成功推送到 main 分支"
          else
            echo "   ✅ sources.txt 无变化，本次无需提交"
          fi
